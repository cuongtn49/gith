    <script>
        var yourAnswer = "";
        var answer = "input";
        function display(){
            const div = document.createElement("div");
            div.className = "fill-blank-box";
            for (let i=0;i<answer.length;i++){
                const input = document.createElement("div");
                input.innerHTML = `<input type="text" maxlength="1">`;
                div.appendChild(input);
            }
            document.getElementById("box").appendChild(div);
        }
        display();
        check();
        function check() {
            const inputs = document.querySelectorAll("#box input");
            inputs[0].focus();
            Array.from(inputs).forEach((element, index) => {
                element.addEventListener('keydown', (event) => {
                    if (element.value !== "") {
                        const nextInput = inputs[index + 1];
                        if (nextInput) {
                            nextInput.focus();
                        }
                        setTimeout(() => {
                            if (index === inputs.length - 2) {
                                Array.from(inputs).forEach((element, index) => {
                                    // yourAnswer += element.value;
                                    element.disabled = true;
                                    if (element.value.toLowerCase() !== answer[index].toLowerCase()) element.style.color = "red";
                                    else element.style.color = "green";
                                });
                                // console.log(yourAnswer);
                            }
                        }, 100);
                    }
                });
            });

        }
    </script>
