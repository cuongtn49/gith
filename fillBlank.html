<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/fillblank.css">
    <title>Document</title>
</head>
<style>
     .choices-container input[type="radio"] {
            opacity: 0;
            position: absolute;
            pointer-events: none;
        }

    #box{
       display: flex; 
       justify-content: center;
       color: black;
    }
    .fill-blank-box {
        display: flex;
        gap: 5px;
        margin-left: 20px;
    }

    .fill-blank-box input {
        width: 20px;
        border: none;
        outline: none;
        border-bottom: 2px solid #ff9800;
        color: #ff9800;
        font-size: 20px;
        display: flex;
        justify-content: center;
        text-align: center;
        padding-bottom: 5px;
    }

    #box {
        display: flex;
    }
</style>
<body>
    <div id="app-container">
        <div class="settings-section" id="settings-container" style="display: none;">
            <h2>Cài đặt chế độ</h2>
            <label>
                <input type="radio" name="mode-selection" value="answer" id="mode-answer" checked /> Điền đáp án
            </label>
            <label>
                <input type="radio" name="mode-selection" value="question" id="mode-question" /> Điền câu hỏi
            </label>
            <label>
                <input type="checkbox" name="options" value="random" id="option-random" /> Câu hỏi ngẫu nhiên
            </label>
            <label>
                <input type="checkbox" name="options" value="limit-length" id="option-limit-length" checked /> Giới hạn
                ký tự
            </label>
            <br />
            <label>
                Số lượng câu hỏi:
                <input type="number" id="question-count" value="5" min="1" />
            </label>
            <button class="action-button" id="start-button" style="display: block; margin: 0 auto; margin-top: 40px;">
                Bắt đầu
            </button>
        </div>

        <div class="content-section" id="quiz-container">
            <h2 class="instructions-text">question 1</h2>
            <h3 class="display-question">Tiếng Anh</h3>
            <!-- <input type="text" id="user-input" placeholder="Nhập câu trả lời tại đây..." autocomplete="off" /> -->
             <div id="box"></div>
            <p class="feedback-message" style="visibility: hidden;">Thông báo kết quả</p>
            <div class="control-buttons">
                <button class="action-button" id="submit-button">Gửi</button>
                <button class="action-button" id="next-button">Tiếp theo</button>
            </div>
        </div>
        <div class="completion-message" style="display: none;">
            🎉 Bạn đã hoàn thành xuất sắc! 🎉
            <span>Chúc mừng bạn với kết quả tuyệt vời!</span>
            <span class="score-display" id="score-display" style="font-weight: 900;">Điểm số: 0</span>
            <span class="correct-count" id="correct-count">Số câu đúng: 0</span>
            <span class="wrong-count" id="wrong-count">Số câu sai: 0</span>
        </div>

        <div class="detailed-review" style="display: none;">
            <h2>Kết quả Chi Tiết</h2>
            <table class="review-data" id="review-data">
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Câu hỏi</th>
                        <th>Câu trả lời</th>
                        <th>Kết quả</th>
                    </tr>
                </thead>
                <tbody class="table-body" id="table-body">
                    <!-- Các hàng dữ liệu sẽ được thêm vào đây -->
                     <tr>
                        <td>1</td>
                        <td>question 1</td>
                        <td>your answer</td>
                        <td>answer</td>
                     </tr>
                </tbody>
            </table>
        </div>
    </div>
    <!-- <script src="../js/app.js"></script> -->
    <script>
        const buttons = document.querySelectorAll(".choice-button");
        buttons.forEach(button => {
            button.addEventListener("click", () => {
                // Xóa trạng thái 'checked' của tất cả nút
                buttons.forEach(btn => btn.classList.remove("checked"));
                // Thêm trạng thái 'checked' cho nút được nhấn
                button.classList.add("checked");
            });
        });

        var yourAnswer = "";
        var answer = "english";
        function display(){
            const div = document.createElement("div");
            div.className = "fill-blank-box";
            for (let i=0;i<answer.length;i++){
                const input = document.createElement("div");
                input.innerHTML = `<input type="text" maxlength="1">`;
                div.appendChild(input);
            }
            document.getElementById("box").appendChild(div);
        }
        display();
        check();
        function check() {
            const inputs = document.querySelectorAll("#box input");
            inputs[0].focus();
            Array.from(inputs).forEach((element, index) => {
                element.addEventListener('keydown', (event) => {
                    if (element.value !== "") {
                        const nextInput = inputs[index + 1];
                        if (nextInput) {
                            nextInput.focus();
                        }
                        setTimeout(() => {
                            if (index === inputs.length - 2) {
                                Array.from(inputs).forEach((element, index) => {
                                    // yourAnswer += element.value;
                                    element.disabled = true;
                                    if (element.value.toLowerCase() !== answer[index].toLowerCase()) element.style.color = "red";
                                    else element.style.color = "green";
                                });
                                // console.log(yourAnswer);
                            }
                        }, 100);
                    }
                });
            });

        }

    </script>
</body>

</html>
